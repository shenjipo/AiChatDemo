name: Deploy ai-chat-demo to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:  # 新增：绑定GitHub Pages环境（必需）
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'  # 新增：缓存pnpm依赖，加速构建

      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm run build

      # 新增：上传构建产物（替代原peaceiris的部分逻辑，更适配新版GitHub Pages）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # 新增：部署到GitHub Pages（官方推荐，替代peaceiris/actions-gh-pages）
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4